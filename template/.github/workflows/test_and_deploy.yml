# This workflows will upload a Python Package using Twine when a release is created
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries
name: tests

on:
  push:
    branches:
      - main
      - npe2
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10
  pull_request:
    branches:
      - main
      - npe2
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.platform }} ${{ matrix.toxenv }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    permissions:
      id-token: write  # needed for codecov OIDC authentication
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            python-version: '3.10'
            toxenv: py310
          - platform: ubuntu-24.04
            python-version: '3.11'
            toxenv: py311
          - platform: ubuntu-24.04
            python-version: '3.12'
            toxenv: py312
          - platform: ubuntu-24.04
            python-version: '3.13'
            toxenv: py313
          - platform: ubuntu-24.04
            python-version: '3.14'
            toxenv: py314
          - platform: windows-latest
            python-version: '3.12'
            toxenv: py312
          - platform: macos-latest
            python-version: '3.12'
            toxenv: py312

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          enable-cache: true

      - name: Setup headless display
        if: runner.os == 'Linux'
        uses: pyvista/setup-headless-display-action@v4.3
        with:
          qt: true
          wm: herbstluftwm

      - name: Test
        run: uvx tox -e ${{ matrix.toxenv }}

      - name: Coverage
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true  # reliable tokenless codecov uploads

  build-and-inspect-package:
    name: Build & inspect package.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.0
      - uses: hynek/build-and-inspect-python-package@v2

  deploy:
    # this will run when you have tagged a commit, starting with "v*"
    # and requires that you have put your twine API key in your
    # github secrets (see readme for details)
    needs: [test, build-and-inspect-package]
    runs-on: ubuntu-latest
    if: contains(github.ref, 'tags')
    permissions:
      id-token: write
    steps:
      - name: Download built artifact to dist/
        uses: actions/download-artifact@v8.0.1
        with:
          name: Packages
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
