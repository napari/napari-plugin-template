name: Test plugin template

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} ${{ matrix.environment }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            environment: py310
          - os: ubuntu-latest
            environment: py311
          - os: ubuntu-latest
            environment: py312
          - os: ubuntu-latest
            environment: py313
          - os: ubuntu-latest
            environment: py314
          - os: windows-latest
            environment: py312
          - os: macos-latest
            environment: py312

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e  # v0.9.4
        with:
          environments: ${{ matrix.environment }}

      - name: Setup headless screenL
        uses: pyvista/setup-headless-display-action@7d84ae825e6d9297a8e99bdbbae20d1b919a0b19 # v4.2
        with:
          qt: true
          wm: herbstluftwm

      - name: Test
        run: pixi run -e ${{ matrix.environment }} test
