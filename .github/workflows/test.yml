name: Test plugin template

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.platform }} ${{ matrix.toxenv }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            python-version: '3.10'
            toxenv: py310
          - platform: ubuntu-24.04
            python-version: '3.11'
            toxenv: py311
          - platform: ubuntu-24.04
            python-version: '3.12'
            toxenv: py312
          - platform: ubuntu-24.04
            python-version: '3.13'
            toxenv: py313
          - platform: ubuntu-24.04
            python-version: '3.14'
            toxenv: py314
          - platform: windows-latest
            python-version: '3.12'
            toxenv: py312
          - platform: macos-latest
            python-version: '3.12'
            toxenv: py312

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          enable-cache: true

      - name: Setup headless screen
        if: runner.os == 'Linux'
        uses: pyvista/setup-headless-display-action@7d84ae825e6d9297a8e99bdbbae20d1b919a0b19 # v4.2
        with:
          qt: true
          wm: herbstluftwm

      - name: Test
        run: uvx tox -e ${{ matrix.toxenv }}
