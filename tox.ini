[tox]
requires =
  tox>=4.31
  tox-uv>=1
recreate = true
skipsdist = true
envlist = py3{10,11,12,13}
toxworkdir = /tmp/.tox
skip_missing_interpreters = true

# Maps GitHub Actions Python version strings to tox environments.
# Used by tox-gh-actions in CI; ignored during local runs.
[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313

[testenv]
passenv = 
  DISPLAY  # required for local linux tests
  XAUTHORITY  # required for local linux tests
deps = copier
       jinja2-time
       npe2
       pytest
       pytest-copie
       tox>=4.31
       tox-uv>=1
commands = pytest -v {posargs:tests}

[pytest]
norecursedirs = "{{plugin_name}}"
